<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - 任务管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 登录/注册 -->
<div id="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">📋</div>
            <h1 class="auth-title">TaskFlow</h1>
            <p class="auth-subtitle">简洁高效的项目与任务管理工具</p>

            <div class="auth-tabs">
                <button class="auth-tab active" data-auth-tab="login">登录</button>
                <button class="auth-tab" data-auth-tab="register">注册</button>
            </div>

            <div class="auth-form active" id="loginForm">
                <div id="loginError" class="auth-error hidden"></div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <button class="auth-submit" id="loginBtn">登录</button>
                <p class="auth-footer">还没有账号？<a id="toRegister">立即注册</a></p>
            </div>

            <div class="auth-form" id="registerForm">
                <div id="registerError" class="auth-error hidden"></div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="registerPassword" class="form-input" placeholder="至少6位" autocomplete="new-password">
                </div>
                <button class="auth-submit" id="registerBtn">创建账号</button>
                <p class="auth-footer">已有账号？<a id="toLogin">返回登录</a></p>
            </div>
        </div>
    </div>
</div>

<!-- 主应用 -->
<div id="app-section" class="hidden">
    <nav class="nav">
        <div class="nav-inner">
            <div class="nav-brand">📋 TaskFlow</div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-view="dashboard">仪表盘</button>
                <button class="nav-tab" data-view="projects">项目</button>
                <button class="nav-tab" data-view="tasks">任务</button>
                <button class="nav-tab" data-view="trash">回收站</button>
                <button class="nav-tab" data-view="timeline">时间轴</button>
            </div>
            <div class="nav-user">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" id="logoutBtn">退出</button>
            </div>
        </div>
    </nav>

    <main class="main">
        <!-- 仪表盘 -->
        <section class="view active" id="view-dashboard">
            <div class="page-header">
                <div>
                    <h2 class="page-title">仪表盘</h2>
                    <p class="page-subtitle">掌握整体项目与任务进展</p>
                </div>
                <button class="btn btn-primary" id="dashAddTaskBtn" onclick="openCreateTaskModal()">+ 新建任务</button>
            </div>

            <div class="stats" id="statsCards"></div>

            <div class="dashboard-grid">
                <div style="flex:1;">
                    <div class="card">
                        <div class="card-header"><div class="card-title">📊 完成率</div></div>
                        <div class="card-body" id="completionSection"></div>
                    </div>

                    <div class="card">
                        <div class="card-header"><div class="card-title">📁 项目进度</div></div>
                        <div class="card-body" id="projectProgress"></div>
                    </div>
                </div>

                <div style="width:380px;">
                    <div class="card">
                        <div class="card-header"><div class="card-title">⚡ 最近任务</div></div>
                        <div class="card-body" id="recentTasks"></div>
                    </div>

                    <div class="card">
                        <div class="card-header"><div class="card-title">🔥 优先级分布</div></div>
                        <div class="card-body" id="priorityDist"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 项目 -->
        <section class="view" id="view-projects">
            <div class="page-header">
                <div>
                    <h2 class="page-title">项目</h2>
                    <p class="page-subtitle">管理你的所有项目</p>
                </div>
                <button class="btn btn-primary" id="addProjectBtn" onclick="openCreateProjectModal()">+ 新建项目</button>
            </div>
            <div class="projects-grid" id="projectsGrid"></div>
        </section>

        <!-- 任务 -->
        <section class="view" id="view-tasks">
            <div class="page-header">
                <div>
                    <h2 class="page-title">任务</h2>
                    <p class="page-subtitle">管理与追踪所有任务</p>
                </div>
                <button class="btn btn-primary" id="addTaskBtn" onclick="openCreateTaskModal()">+ 新建任务</button>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);">🔍</span>
                    <input type="text" id="taskSearchInput" class="form-input" placeholder="搜索任务..." style="padding-left:40px;">
                </div>
                <select id="statusFilter" class="form-input" style="width:120px;">
                    <option value="">全部</option>
                    <option value="false">进行中</option>
                    <option value="true">已完成</option>
                </select>
                <select id="priorityFilter" class="form-input" style="width:120px;">
                    <option value="all">所有优先级</option>
                    <option value="high">高</option>
                    <option value="medium">中</option>
                    <option value="low">低</option>
                    <option value="none">无</option>
                </select>
                <button class="btn btn-secondary" id="clearCompletedBtn">清空已完成</button>
            </div>

            <div class="toolbar" id="projectFilterBar" style="padding:12px 20px;"></div>

            <div class="task-grid" id="tasksGrid"></div>
        </section>

        <!-- 回收站 -->
        <section class="view" id="view-trash">
            <div class="page-header">
                <div>
                    <h2 class="page-title">回收站</h2>
                    <p class="page-subtitle">已删除的任务（可恢复或永久删除）</p>
                </div>
                <button class="btn btn-danger" id="emptyTrashBtn">清空回收站</button>
            </div>
            <div class="card">
                <div class="card-body" id="trashList"></div>
            </div>
        </section>

        <!-- 时间轴 -->
        <section class="view" id="view-timeline">
            <div class="page-header">
                <div>
                    <h2 class="page-title">时间轴</h2>
                    <p class="page-subtitle">按日期查看任务分布</p>
                </div>
                <div class="flex" style="gap:8px;">
                    <button class="btn btn-primary" id="timelineAddBtn" onclick="openCreateTaskModal()">+ 新建任务</button>
                </div>
            </div>

            <div class="timeline-toolbar">
                <div class="timeline-nav">
                    <button class="btn btn-secondary" id="timelinePrevBtn">← 前一周</button>
                    <button class="btn btn-secondary" id="timelineTodayBtn">今天</button>
                    <button class="btn btn-secondary" id="timelineNextBtn">后一周 →</button>
                </div>
                <div class="flex" style="gap:8px;">
                    <button class="btn btn-secondary" data-timeline-view="week">周视图</button>
                    <button class="btn btn-secondary" data-timeline-view="month">月视图</button>
                </div>
            </div>

            <div class="timeline-table" id="timelineTable"></div>
        </section>
    </main>
</div>

<!-- 项目模态框 -->
<div class="modal hidden" id="projectModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="projectModalTitle">新建项目</div>
            <button class="modal-close" data-close-modal="projectModal">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">项目名称 *</label>
                <input type="text" id="projectName" class="form-input" placeholder="例如：产品研发">
            </div>
            <div class="form-group">
                <label class="form-label">项目描述</label>
                <textarea id="projectDescription" class="form-input" placeholder="简要描述..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">颜色</label>
                <div class="flex" style="gap:8px;flex-wrap:wrap;" id="colorPicker">
                    <div class="color-swatch active" style="background:#0071e3;" data-color="#0071e3"></div>
                    <div class="color-swatch" style="background:#34c759;" data-color="#34c759"></div>
                    <div class="color-swatch" style="background:#ff9500;" data-color="#ff9500"></div>
                    <div class="color-swatch" style="background:#af52de;" data-color="#af52de"></div>
                    <div class="color-swatch" style="background:#ff3b30;" data-color="#ff3b30"></div>
                    <div class="color-swatch" style="background:#5ac8fa;" data-color="#5ac8fa"></div>
                    <div class="color-swatch" style="background:#ff2d55;" data-color="#ff2d55"></div>
                </div>
            </div>
            <input type="hidden" id="projectColor" value="#0071e3">
            <input type="hidden" id="projectId" value="">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-close-modal="projectModal">取消</button>
            <button class="btn btn-primary" id="saveProjectBtn">保存</button>
        </div>
    </div>
</div>

<!-- 任务模态框 -->
<div class="modal hidden" id="taskModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="taskModalTitle">新建任务</div>
            <button class="modal-close" data-close-modal="taskModal">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">任务标题 *</label>
                <input type="text" id="taskTitle" class="form-input" placeholder="例如：完成登录功能开发">
            </div>
            <div class="form-group">
                <label class="form-label">任务描述</label>
                <textarea id="taskDescription" class="form-input" placeholder="详细描述..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">所属项目</label>
                <select id="taskProjectSelect" class="form-input"></select>
            </div>
            <div class="form-group">
                <label class="form-label">分类</label>
                <select id="taskCategory" class="form-input">
                    <option value="other">其他</option>
                    <option value="defect">缺陷</option>
                    <option value="implementation">实现</option>
                    <option value="management">管理</option>
                    <option value="coordination">协调</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">优先级</label>
                <select id="taskPriority" class="form-input">
                    <option value="none">无</option>
                    <option value="high">高</option>
                    <option value="medium">中</option>
                    <option value="low">低</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">截止时间 *</label>
                <input type="datetime-local" id="taskDueDate" class="form-input">
            </div>
            <input type="hidden" id="taskId" value="">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-close-modal="taskModal">取消</button>
            <button class="btn btn-primary" id="saveTaskBtn">保存</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/projects.js"></script>
<script src="js/tasks.js"></script>
<script src="js/trash.js"></script>
<script src="js/timeline.js"></script>
<script src="js/app.js"></script>

</body>
</html>
