<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow · 智能任务流</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100' rx='20'/><text y='.9em' font-size='70' x='18' fill='%23fff'>✓</text></svg>" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --bg-subtle: #f5f5f7;
            --surface: rgba(255, 255, 255, 0.8);
            --surface-hover: rgba(255, 255, 255, 0.95);
            --border: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(0, 0, 0, 0.1);
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --text-muted: #acacb0;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --danger: #ff3b30;
            --success: #34c759;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --auth-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 导航 */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 17px;
            color: var(--text);
        }
        .nav-brand svg {
            width: 32px;
            height: 32px;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-subtle);
            padding: 4px;
            border-radius: var(--radius);
        }
        .nav-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-tab:hover {
            color: var(--text);
        }
        .nav-tab.active {
            background: white;
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }
        .nav-tab i {
            font-size: 13px;
        }

        /* 主内容 */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 32px;
        }
        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .view.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.2s;
        }
        .stat:hover {
            box-shadow: var(--shadow);
            border-color: var(--border-hover);
        }
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .stat-icon.blue { background: rgba(0, 113, 227, 0.1); color: var(--accent); }
        .stat-icon.orange { background: rgba(255, 149, 0, 0.1); color: #ff9500; }
        .stat-icon.green { background: rgba(52, 199, 89, 0.1); color: var(--success); }
        .stat-icon.purple { background: rgba(175, 82, 222, 0.1); color: #af52de; }
        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            font-feature-settings: 'tnum';
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 仪表盘布局 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title i {
            color: var(--text-muted);
            font-size: 14px;
        }
        .card-body {
            padding: 20px 24px;
        }

        /* 完成率 */
        .completion {
            display: flex;
            align-items: center;
            gap: 48px;
        }
        .ring-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }
        .ring-wrapper svg {
            transform: rotate(-90deg);
        }
        .ring-bg {
            fill: none;
            stroke: var(--bg-subtle);
            stroke-width: 8;
        }
        .ring-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }
        .ring-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .ring-percent {
            font-size: 28px;
            font-weight: 600;
        }
        .ring-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .completion-info {
            flex: 1;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .info-row:last-child {
            border: none;
        }
        .info-label {
            color: var(--text-secondary);
        }
        .info-value {
            font-weight: 500;
            font-feature-settings: 'tnum';
        }

        /* 项目进度 */
        .project-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }
        .project-item:last-child {
            border: none;
            padding-bottom: 0;
        }
        .project-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .project-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        .project-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .project-count {
            font-size: 12px;
            color: var(--text-muted);
            font-feature-settings: 'tnum';
        }
        .progress-bar {
            height: 4px;
            background: var(--bg-subtle);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        /* 任务列表 */
        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        .task-item:last-child {
            border: none;
            padding-bottom: 0;
        }
        .task-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            background: white;
        }
        .task-check:hover {
            border-color: var(--accent);
        }
        .task-check.done {
            background: var(--accent);
            border-color: var(--accent);
        }
        .task-check.done i {
            color: white;
            font-size: 11px;
        }
        .task-content {
            flex: 1;
            min-width: 0;
        }
        .task-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-title.done {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .task-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 页面标题 */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
        }
        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 按钮 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-secondary {
            background: var(--bg-subtle);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--border);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            background: var(--bg-subtle);
            color: var(--text);
        }

        /* 项目网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.2s;
        }
        .project-card:hover {
            box-shadow: var(--shadow);
            border-color: var(--border-hover);
        }
        .project-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
        }
        .project-card-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .project-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .project-stats {
            display: flex;
            gap: 24px;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .project-stat-val {
            font-size: 20px;
            font-weight: 600;
            font-feature-settings: 'tnum';
        }
        .project-stat-lbl {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .project-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-xs);
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:hover {
            background: var(--border);
            color: var(--text);
        }
        .icon-btn.danger:hover {
            background: rgba(255, 59, 48, 0.1);
            border-color: rgba(255, 59, 48, 0.2);
            color: var(--danger);
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .search-box {
            flex: 1;
            position: relative;
        }
        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: white;
            transition: all 0.2s;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }
        .filter-chip {
            padding: 8px 14px;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-chip:hover, .filter-chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .filter-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        /* 任务网格 */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .task-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .task-card:hover {
            box-shadow: var(--shadow);
            border-color: var(--border-hover);
        }
        .task-card-top {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }
        .task-card-body {
            margin-left: 34px;
        }
        .task-card-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .task-card-title.done {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .task-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .task-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .tag {
            padding: 4px 10px;
            border-radius: var(--radius-xs);
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tag.project {
            background: var(--bg-subtle);
            color: var(--text-secondary);
        }
        .tag.cat-defect { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
        .tag.cat-implementation { background: rgba(0, 113, 227, 0.1); color: var(--accent); }
        .tag.cat-management { background: rgba(175, 82, 222, 0.1); color: #af52de; }
        .tag.cat-coordination { background: rgba(255, 149, 0, 0.1); color: #ff9500; }
        .tag.cat-other { background: var(--bg-subtle); color: var(--text-secondary); }
        .tag.priority-high { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
        .tag.priority-medium { background: rgba(255, 149, 0, 0.1); color: #ff9500; }
        .tag.priority-low { background: rgba(0, 113, 227, 0.1); color: var(--accent); }
        .tag.overdue { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
        .task-card-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .task-date {
            font-size: 12px;
            color: var(--text-muted);
            font-feature-settings: 'tnum';
        }
        .task-date.overdue {
            color: var(--danger);
        }
        .task-delete {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-xs);
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .task-delete:hover {
            background: rgba(255, 59, 48, 0.1);
            color: var(--danger);
        }

        /* 时间轴 */
        .timeline-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            margin-bottom: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .timeline-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timeline-table {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .timeline-header {
            display: flex;
            background: var(--bg-subtle);
            border-bottom: 1px solid var(--border);
        }
        .timeline-date {
            flex: 1;
            min-width: 100px;
            padding: 14px 8px;
            text-align: center;
            font-size: 12px;
            border-right: 1px solid var(--border);
        }
        .timeline-date:last-child {
            border-right: none;
        }
        .timeline-date .day-name {
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .timeline-date .day-num {
            font-size: 16px;
            font-weight: 600;
        }
        .timeline-date.today {
            background: rgba(0, 113, 227, 0.05);
        }
        .timeline-date.today .day-num {
            color: var(--accent);
        }
        .timeline-date.weekend .day-name {
            color: var(--text-muted);
        }
        .timeline-body {
            position: relative;
        }
        .today-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            z-index: 5;
        }
        .today-line::before {
            content: 'TODAY';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }
        .timeline-row {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .timeline-row:last-child {
            border-bottom: none;
        }
        .timeline-row.collapsed .timeline-tasks {
            display: none;
        }
        .timeline-row-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            background: var(--bg-subtle);
            transition: background 0.2s;
        }
        .timeline-row-header:hover {
            background: var(--border);
        }
        .chevron {
            transition: transform 0.2s;
            color: var(--text-muted);
        }
        .timeline-row.collapsed .chevron {
            transform: rotate(-90deg);
        }
        .timeline-project-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .timeline-project-name {
            font-size: 14px;
            font-weight: 600;
        }
        .timeline-project-meta {
            font-size: 12px;
            color: var(--text-muted);
            font-feature-settings: 'tnum';
        }
        .timeline-progress-mini {
            width: 100px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-left: auto;
        }
        .timeline-progress-mini-fill {
            height: 100%;
            border-radius: 2px;
        }
        .timeline-row-body {
            display: flex;
            width: 100%;
        }
        .timeline-col {
            flex: 1;
            min-width: 100px;
            padding: 8px;
            border-right: 1px solid var(--border);
            min-height: 50px;
        }
        .timeline-col:last-child {
            border-right: none;
        }
        .timeline-task {
            padding: 6px 10px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .timeline-task:hover {
            border-color: var(--accent);
            background: white;
        }
        .timeline-task.done {
            opacity: 0.5;
            text-decoration: line-through;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.2s;
        }
        .modal-content {
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .modal-title {
            font-size: 17px;
            font-weight: 600;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-xs);
            background: var(--bg-subtle);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: var(--border);
            color: var(--text);
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* 颜色选择器 */
        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .color-swatch:hover {
            transform: scale(1.1);
        }
        .color-swatch.active {
            border-color: var(--text);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            background: var(--text);
            color: white;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s ease;
        }
        .toast.error {
            background: var(--danger);
        }
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty i {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty p {
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .nav-inner { padding: 0 16px; }
            .main { padding: 32px 16px; }
            .stats { grid-template-columns: 1fr 1fr; gap: 12px; }
            .stat { padding: 20px; }
            .stat-value { font-size: 28px; }
            .nav-tabs { display: none; }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* 登录页面 */
        #auth-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--auth-bg);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 48px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }
        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            background: var(--bg-subtle);
            border-radius: var(--radius-sm);
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: transparent;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .auth-tab.active {
            background: white;
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .auth-form .form-group {
            margin-bottom: 16px;
        }
        .auth-form label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }
        .auth-form input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            background: white;
            transition: all 0.2s;
            outline: none;
        }
        .auth-form input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }
        .auth-form .error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            min-height: 18px;
        }
        .auth-form .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .auth-form .btn:hover {
            background: var(--accent-hover);
        }
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            text-align: center;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .auth-divider span {
            padding: 0 16px;
            color: var(--text-muted);
            font-size: 13px;
        }
        .auth-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="auth-container">
        <div class="auth-card">
            <div class="auth-header">

            <div class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label for="registerPassword">密码</label>

                </div>
            </div>
        </div>
    </div>
    
    <div id="app-container">
        <nav class="nav">
        <div class="nav-inner">
            <div class="nav-brand">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" rx="20" fill="#1d1d1f"/>
                    <path d="M30 52L44 66L70 34" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

                TaskFlow

                </button>
            </div>
        </div>
    </nav>

    <main class="main">
        <!-- 仪表盘 -->
        <section class="view active" id="view-dashboard">
            <div class="stats">
                <div class="stat">
                    <div class="stat-icon blue"><i class="fa-solid fa-inbox"></i></div>
                    <div class="stat-value" id="totalStat">0</div>
                    <div class="stat-label">总任务</div>
                </div>
                <div class="stat">
                    <div class="stat-icon orange"><i class="fa-solid fa-spinner"></i></div>
                    <div class="stat-value" id="activeStat">0</div>
                    <div class="stat-label">进行中</div>
                </div>
                <div class="stat">
                    <div class="stat-icon green"><i class="fa-solid fa-check"></i></div>
                    <div class="stat-value" id="completedStat">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat">
                    <div class="stat-icon purple"><i class="fa-solid fa-layer-group"></i></div>
                    <div class="stat-value" id="projectStat">0</div>
                    <div class="stat-label">项目数</div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fa-solid fa-chart-pie"></i>完成率</h3>
                    </div>
                    <div class="card-body">
                        <div class="completion">
                            <div class="ring-wrapper">
                                <svg width="120" height="120">
                                    <circle class="ring-bg" cx="60" cy="60" r="52"/>
                                    <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="52" stroke-dasharray="327" stroke-dashoffset="327"/>
                                </svg>

                                    <span class="info-label">已完成</span>

                                </div>
                                <div class="info-row">
                                    <span class="info-label">进行中</span>
                                    <span class="info-value" id="infoActive">0</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">总任务</span>
                                    <span class="info-value" id="infoTotal">0</span>
                                </div>

                    </div>

                <div class="card" style="grid-column: 1 / -1;">

                    </div>
                </div>

        <!-- 项目管理 -->
        <section class="view" id="view-projects">

                <div>
                    <h1 class="page-title">项目管理</h1>
                    <p class="page-subtitle">管理所有项目 · 可视化进度追踪</p>
                </div>

                    <i class="fa-solid fa-plus"></i>新建项目
                </button>
            </div>
            <div class="projects-grid" id="projectsList"></div>
        </section>

        <!-- 任务列表 -->

                    <button class="btn btn-secondary" id="clearCompletedBtn">
                        <i class="fa-solid fa-broom"></i>清空已完成
                    </button>
                    <button class="btn btn-primary" id="addTaskBtn">
                        <i class="fa-solid fa-plus"></i>新建任务
                    </button>

            </div>

                    </button>

                <div style="display: flex; gap: 8px;">

    <!-- 项目模态框 -->
    <div class="modal" id="projectModal" style="display: none;">

    <!-- 任务模态框 -->

                <h3 class="modal-title" id="taskModalTitle">新建任务</h3>

    <!-- 确认模态框 -->
    <div class="modal" id="confirmModal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title" id="confirmTitle">确认</h3>
                <button class="modal-close" data-close-modal="confirmModal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage" style="color: var(--text-secondary); font-size: 14px; line-height: 1.6;"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-close-modal="confirmModal">取消</button>
                <button class="btn btn-primary" id="confirmOk">确认</button>
            </div>
        </div>
    </div>

    <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://localhost:3001/api'
        : window.location.origin + '/api';
    let tasks = [];
    let projects = [];
    let currentProjectFilter = '';
    let currentStatusFilter = 'all';
    let searchQuery = '';
    let editingProjectId = null;
    let confirmCallback = null;
    let timelineStartDate = new Date();
    timelineStartDate.setHours(0, 0, 0, 0);
    let timelineMode = 'week';
    let timelineDays = 14;
    let dayWidth = 100;
    let collapsedProjects = {};
    let currentUser = null;

    function getToken() {
        return localStorage.getItem('taskflow_token');
    }

    function setToken(token) {
        localStorage.setItem('taskflow_token', token);
    }

    function clearToken() {
        localStorage.removeItem('taskflow_token');
        currentUser = null;
    }

    async function fetchWithAuth(url, options = {}) {
        const token = getToken();
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers
        };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        const response = await fetch(url, { ...options, headers });
        if (response.status === 401) {
            clearToken();
            showAuthPage();
            throw new Error('Unauthorized');
        }
        return response;
    }

    async function login(email, password) {
        const response = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (response.ok) {
            setToken(data.token);
            currentUser = data.user;
            return true;
        }
        throw new Error(data.error || '登录失败');
    }

    async function register(email, password) {
        const response = await fetch(`${API_BASE}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (response.ok) {
            return true;
        }
        throw new Error(data.error || '注册失败');
    }

    async function checkAuth() {
        const token = getToken();
        if (!token) {
            showAuthPage();
            return false;
        }
        try {
            const response = await fetchWithAuth(`${API_BASE}/auth/user`);
            if (response.ok) {
                const data = await response.json();
                currentUser = data;
                return true;
            }
        } catch {
            showAuthPage();
            return false;
        }
        showAuthPage();
        return false;
    }

    function showAuthPage() {
        document.getElementById('app-container').style.display = 'none';
        document.getElementById('auth-container').style.display = 'flex';
    }

    function showApp() {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorEl = document.getElementById('loginError');
        try {
            errorEl.textContent = '';
            await login(email, password);
            showApp();
            await loadData();
            showView('dashboard');
            showToast('登录成功');
        } catch (err) {
            errorEl.textContent = err.message;
        }
    }

    async function handleRegister() {
        const email = document.getElementById('registerEmail').value;
        const password = document.getElementById('registerPassword').value;
        const confirm = document.getElementById('registerConfirm').value;
        const errorEl = document.getElementById('registerError');
        try {
            errorEl.textContent = '';
            if (password !== confirm) {
                throw new Error('两次输入的密码不一致');
            }
            if (password.length < 6) {
                throw new Error('密码长度至少需要6位');
            }
            await register(email, password);
            showToast('注册成功，请登录');
            document.getElementById('authTabLogin').click();
        } catch (err) {
            errorEl.textContent = err.message;
        }
    }

    async function handleLogout() {
        clearToken();
        showAuthPage();
        showToast('已退出登录');
    }

    const COLORS = ['#0071e3', '#ff9500', '#ff3b30', '#34c759', '#af52de', '#5856d6'];

    function getColor(hex) {
        if (!hex) return COLORS[0];
        return COLORS.find(c => c.toLowerCase() === hex.toLowerCase()) || hex;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function getCategoryLabel(c) {
        return { defect: '缺陷', implementation: '实施', management: '管理', coordination: '协调', other: '其他' }[c] || '其他';
    }

    function showToast(message, type = 'success') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast' + (type === 'error' ? ' error' : '');
        toast.innerHTML = `<i class="fa-solid fa-${type === 'error' ? 'exclamation-circle' : 'check'}"></i>${escapeHtml(message)}`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    function showConfirm(title, message, callback) {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        confirmCallback = callback;
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function hideConfirm() {
        document.getElementById('confirmModal').style.display = 'none';
    }

    async function loadData() {
        try {
            const [tasksRes, projectsRes] = await Promise.all([
                fetchWithAuth(API_BASE + '/tasks'),
                fetchWithAuth(API_BASE + '/projects')
            ]);
            tasks = (await tasksRes.json()).map(t => ({ ...t, completed: t.completed === 1 }));
            projects = await projectsRes.json();
        } catch (e) {
            showToast('加载数据失败', 'error');
        }
    }

    function showView(view) {
        document.querySelectorAll('.view').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        document.querySelector(`[data-view="${view}"]`).classList.add('active');
        if (view === 'dashboard') renderDashboard();
        else if (view === 'projects') renderProjects();
        else if (view === 'tasks') { updateProjectFilterChips(); renderTasks(); }
        else if (view === 'timeline') renderTimeline();
    }

    function renderDashboard() {
        const active = tasks.filter(t => !t.deleted && !t.completed);
        const completed = tasks.filter(t => !t.deleted && t.completed);
        const total = active.length + completed.length;
        const rate = total > 0 ? Math.round((completed.length / total) * 100) : 0;

        document.getElementById('totalStat').textContent = total;
        document.getElementById('activeStat').textContent = active.length;
        document.getElementById('completedStat').textContent = completed.length;
        document.getElementById('projectStat').textContent = projects.length;
        document.getElementById('completionPercent').textContent = rate + '%';
        document.getElementById('infoDone').textContent = completed.length;
        document.getElementById('infoActive').textContent = active.length;
        document.getElementById('infoTotal').textContent = total;

        document.getElementById('ringProgress').style.strokeDashoffset = 327 - (rate / 100) * 327;

        renderProjectProgress();
        renderRecentTasks();
    }

    function renderProjectProgress() {
        const list = document.getElementById('projectProgressList');
        if (projects.length === 0) {
            list.innerHTML = '<div class="empty"><i class="fa-solid fa-folder-open"></i><p>暂无项目</p></div>';
            return;
        }
        list.innerHTML = projects.map(project => {
            const pts = tasks.filter(t => !t.deleted && t.project_id === project.id);
            const done = pts.filter(t => t.completed).length;
            const rate = pts.length > 0 ? Math.round((done / pts.length) * 100) : 0;
            const color = getColor(project.color);
            return `
                <div class="project-item">
                    <div class="project-header">
                        <div class="project-name">
                            <span class="project-dot" style="background: ${color};"></span>
                            ${escapeHtml(project.name)}
                        </div>
                        <span class="project-count">${done}/${pts.length}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${rate}%; background: ${color};"></div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderRecentTasks() {
        const list = document.getElementById('recentTasksList');
        const recent = tasks.filter(t => !t.deleted)
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
            .slice(0, 5);
        if (recent.length === 0) {
            list.innerHTML = '<div class="empty"><i class="fa-solid fa-inbox"></i><p>暂无任务</p></div>';
            return;
        }
        list.innerHTML = recent.map(task => {
            const proj = projects.find(p => p.id === task.project_id);
            return `
                <div class="task-item" data-edit-task="${task.id}">
                    <div class="task-check ${task.completed ? 'done' : ''}" data-toggle-task="${task.id}">
                        ${task.completed ? '<i class="fa-solid fa-check"></i>' : ''}
                    </div>
                    <div class="task-content">
                        <div class="task-title ${task.completed ? 'done' : ''}">${escapeHtml(task.title)}</div>
                        <div class="task-meta">
                            ${proj ? escapeHtml(proj.name) : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderProjects() {
        const list = document.getElementById('projectsList');
        if (projects.length === 0) {
            list.innerHTML = '<div class="empty"><p>暂无项目 · 点击右上角创建</p></div>';
            return;
        }
        list.innerHTML = projects.map(project => {
            const pts = tasks.filter(t => !t.deleted && t.project_id === project.id);
            const done = pts.filter(t => t.completed).length;
            const color = getColor(project.color);
            const isDefault = project.name === '默认项目';
            return `
                <div class="project-card">
                    <div class="project-icon" style="background: ${color};">${escapeHtml(project.name.charAt(0))}</div>
                    <div class="project-card-name">${escapeHtml(project.name)}</div>
                    <div class="project-card-desc">${escapeHtml(project.description || '暂无描述')}</div>
                    <div class="project-stats">
                        <div>
                            <div class="project-stat-val" style="color: ${color};">${pts.length}</div>
                            <div class="project-stat-lbl">任务</div>
                        </div>
                        <div>
                            <div class="project-stat-val">${done}</div>
                            <div class="project-stat-lbl">完成</div>
                        </div>
                        <div>
                            <div class="project-stat-val" style="color: ${color};">${pts.length > 0 ? Math.round(done/pts.length*100) : 0}%</div>
                            <div class="project-stat-lbl">进度</div>
                        </div>
                    </div>
                    <div class="project-actions">
                        <button class="icon-btn" data-show-tasks="${project.id}" title="查看任务">
                            <i class="fa-solid fa-list"></i>
                        </button>
                        <button class="icon-btn" data-edit-project="${project.id}" title="编辑">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        ${!isDefault ? `
                        <button class="icon-btn danger" data-delete-project="${project.id}" title="删除">
                            <i class="fa-solid fa-trash"></i>
                        </button>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateProjectFilterChips() {
        const list = document.getElementById('projectFilterChips');
        list.innerHTML = projects.map(p => {
            const isActive = currentProjectFilter === p.id;
            return `<button class="filter-chip ${isActive ? 'active' : ''}" data-filter-project="${p.id}">
                <span class="dot" style="background: ${getColor(p.color)};"></span>
                ${escapeHtml(p.name)}
            </button>`;
        }).join('');
    }

    function renderTasks() {
        let filtered = tasks.filter(t => !t.deleted);
        if (currentProjectFilter) filtered = filtered.filter(t => t.project_id === currentProjectFilter);
        if (currentStatusFilter === 'active') filtered = filtered.filter(t => !t.completed);
        else if (currentStatusFilter === 'completed') filtered = filtered.filter(t => t.completed);
        if (searchQuery) filtered = filtered.filter(t => 
            t.title.toLowerCase().includes(searchQuery) || 
            (t.description && t.description.toLowerCase().includes(searchQuery))
        );
        filtered.sort((a, b) => {
            if (a.completed !== b.completed) return a.completed ? 1 : -1;
            return new Date(a.due_date_time) - new Date(b.due_date_time);
        });

        document.getElementById('taskCountBadge').textContent = filtered.length;
        const list = document.getElementById('tasksList');

        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty"><i class="fa-solid fa-inbox"></i><p>暂无任务</p></div>';
            return;
        }

        list.innerHTML = filtered.map(task => {
            const proj = projects.find(p => p.id === task.project_id);
            const isOverdue = task.due_date_time && new Date(task.due_date_time) < new Date() && !task.completed;
            return `
                <div class="task-card" data-edit-task="${task.id}">
                    <div class="task-card-top">
                        <div class="task-check ${task.completed ? 'done' : ''}" data-toggle-task="${task.id}">
                            ${task.completed ? '<i class="fa-solid fa-check"></i>' : ''}
                        </div>
                    </div>
                    <div class="task-card-body">
                        <div class="task-card-title ${task.completed ? 'done' : ''}">${escapeHtml(task.title)}</div>
                        ${task.description ? `<div class="task-card-desc">${escapeHtml(task.description)}</div>` : ''}
                        <div class="task-tags">
                            ${proj ? `<span class="tag project">${escapeHtml(proj.name)}</span>` : ''}
                            <span class="tag cat-${task.category || 'other'}">${getCategoryLabel(task.category)}</span>
                            ${task.priority && task.priority !== 'none' ? `<span class="tag priority-${task.priority}">${task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低'}</span>` : ''}
                            ${isOverdue ? '<span class="tag overdue">已逾期</span>' : ''}
                        </div>
                        <div class="task-card-foot">
                            <span class="task-date ${isOverdue ? 'overdue' : ''}">
                                ${formatDate(task.due_date_time)}
                            </span>
                            <button class="task-delete" data-delete-task="${task.id}">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderTimeline() {
        const container = document.getElementById('timelineContainer');
        const totalWidth = timelineDays * dayWidth;
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const todayOffset = (today - timelineStartDate) / (1000 * 60 * 60 * 24) * dayWidth;

        let datesHtml = '';
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        for (let i = 0; i < timelineDays; i++) {
            const d = new Date(timelineStartDate);
            d.setDate(d.getDate() + i);
            const isToday = d.getTime() === today.getTime();
            const isWeekend = d.getDay() === 0 || d.getDay() === 6;
            datesHtml += `
                <div class="timeline-date ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}" style="min-width: ${dayWidth}px;">
                    <div class="day-name">周${weekdays[d.getDay()]}</div>
                    <div class="day-num">${d.getDate()}</div>
                </div>
            `;
        }

        const projectsWithTasks = projects.map(p => ({
            ...p,
            tasks: tasks.filter(t => !t.deleted && t.project_id === p.id && t.due_date_time)
                .sort((a, b) => new Date(a.due_date_time) - new Date(b.due_date_time))
        })).filter(p => p.tasks.length > 0);

        if (projectsWithTasks.length === 0) {
            container.innerHTML = `<div class="card"><div class="empty"><i class="fa-solid fa-calendar"></i><p>暂无任务数据</p></div></div>`;
            return;
        }

        let rowsHtml = '';
        projectsWithTasks.forEach(project => {
            const collapsed = collapsedProjects[project.id];
            const done = project.tasks.filter(t => t.completed).length;
            const rate = project.tasks.length > 0 ? Math.round((done / project.tasks.length) * 100) : 0;
            const color = getColor(project.color);

            let tasksHtml = '';
            for (let i = 0; i < timelineDays; i++) {
                const d = new Date(timelineStartDate);
                d.setDate(d.getDate() + i);
                const dayStart = new Date(d);
                dayStart.setHours(0,0,0,0);
                const dayEnd = new Date(d);
                dayEnd.setHours(23,59,59,999);
                const dayTasks = project.tasks.filter(t => {
                    const td = new Date(t.due_date_time);
                    return td >= dayStart && td <= dayEnd;
                });
                tasksHtml += `
                    <div class="timeline-col" style="min-width: ${dayWidth}px;">
                        ${dayTasks.map(t => `
                            <div class="timeline-task ${t.completed ? 'done' : ''}" style="border-color: ${color};" data-task-detail="${t.id}">
                                <i class="fa-solid ${t.completed ? 'fa-check' : 'fa-clock'}"></i>
                                <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(t.title)}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            rowsHtml += `
                <div class="timeline-row ${collapsed ? 'collapsed' : ''}" data-project-id="${project.id}">
                    <div class="timeline-row-header" data-toggle-collapse="${project.id}">
                        <i class="fa-solid fa-chevron-down chevron"></i>
                        <span class="timeline-project-dot" style="background: ${color};"></span>
                        <span class="timeline-project-name">${escapeHtml(project.name)}</span>
                        <span class="timeline-project-meta">${done}/${project.tasks.length} · ${rate}%</span>
                        <div class="timeline-progress-mini">
                            <div class="timeline-progress-mini-fill" style="width: ${rate}%; background: ${color};"></div>
                        </div>
                    </div>
                    <div class="timeline-row-body" style="width: ${totalWidth}px;">
                        ${tasksHtml}
                    </div>
                </div>
            `;
        });

        let todayLine = '';
        if (todayOffset >= 0 && todayOffset < totalWidth) {
            todayLine = `<div class="today-line" style="left: calc(${todayOffset}px + 200px);"></div>`;
        }

        container.innerHTML = `
            <div class="timeline-header" style="padding-left: 200px;">${datesHtml}</div>
            <div class="timeline-body" style="position: relative;">
                ${todayLine}
                ${rowsHtml}
            </div>
        `;
    }

    // 模态框
    function openCreateProjectModal() {
        editingProjectId = null;
        document.getElementById('projectModalTitle').textContent = '新建项目';
        document.getElementById('projectId').value = '';
        document.getElementById('projectName').value = '';
        document.getElementById('projectDescription').value = '';
        document.getElementById('projectColor').value = '#0071e3';
        document.querySelectorAll('#colorPicker .color-swatch').forEach(s => s.classList.remove('active'));
        document.querySelector('#colorPicker .color-swatch').classList.add('active');
        document.getElementById('projectModal').style.display = 'flex';
    }

    async function saveProject() {
        const name = document.getElementById('projectName').value.trim();
        if (!name) {
            showToast('请输入项目名称', 'error');
            return;
        }
        const description = document.getElementById('projectDescription').value.trim();
        const color = document.getElementById('projectColor').value;
        try {
            const method = editingProjectId ? 'PUT' : 'POST';
            const url = editingProjectId ? `${API_BASE}/projects/${editingProjectId}` : `${API_BASE}/projects`;
            await fetchWithAuth(url, {
                method,
                body: JSON.stringify({ name, description, color })
            });
            document.getElementById('projectModal').style.display = 'none';
            await loadData();
            renderDashboard();
            renderProjects();
            showToast(editingProjectId ? '项目已更新' : '项目已创建');
        } catch (e) {
            showToast('操作失败', 'error');
        }
    }

    function openCreateTaskModal() {
        document.getElementById('taskModalTitle').textContent = '新建任务';
        document.getElementById('taskId').value = '';
        document.getElementById('taskDescription').value = '';
        document.getElementById('taskProjectSelect').value = currentProjectFilter || '';
        document.getElementById('taskCategory').value = 'other';
        document.getElementById('taskPriority').value = 'none';
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('taskDueDate').value = tomorrow.toISOString().slice(0, 16);
        updateProjectSelect();
        document.getElementById('taskModal').style.display = 'flex';
    }

    function updateProjectSelect() {
        const select = document.getElementById('taskProjectSelect');
        select.innerHTML = `
            <option value="">未分配</option>
            ${projects.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('')}
        `;
    }

    async function saveTask() {
        const dueDate = document.getElementById('taskDueDate').value;
        if (!dueDate) {
            showToast('请选择截止时间', 'error');
            return;
        }
        const description = document.getElementById('taskDescription').value.trim();
        const title = description.substring(0, 50) || '未命名任务';
        const taskId = document.getElementById('taskId').value;
        try {
            const method = taskId ? 'PUT' : 'POST';
            const url = taskId ? `${API_BASE}/tasks/${taskId}` : `${API_BASE}/tasks`;
            await fetchWithAuth(url, {
                method,
                body: JSON.stringify({
                    title, description,
                    category: document.getElementById('taskCategory').value,
                    priority: document.getElementById('taskPriority').value,
                    due_date_time: new Date(dueDate).toISOString(),
                    project_id: document.getElementById('taskProjectSelect').value || null
                })
            });
            document.getElementById('taskModal').style.display = 'none';
            await loadData();
            renderDashboard();
            renderProjects();
            renderTasks();
            showToast(taskId ? '任务已更新' : '任务已创建');
        } catch (e) {
            showToast('操作失败', 'error');
        }
    }

    // 事件委托
    document.addEventListener('click', async (e) => {
        const target = e.target.closest('[data-view], [data-jump], [data-toggle-task], [data-edit-task], [data-edit-project], [data-delete-project], [data-delete-task], [data-show-tasks], [data-close-modal], [data-filter-status], [data-filter-project], [data-timeline-view], [data-task-detail], [data-toggle-collapse]');
        if (!target) return;

        if (target.matches('[data-view]')) {
            showView(target.dataset.view);
        } else if (target.matches('[data-jump]')) {
            showView(target.dataset.jump);
        } else if (target.closest('[data-toggle-task]')) {
            e.stopPropagation();
            const id = target.closest('[data-toggle-task]').dataset.toggleTask;
            const task = tasks.find(t => t.id === id);
            if (task) {
                await fetchWithAuth(`${API_BASE}/tasks/${id}/complete`, {
                    method: 'PUT',
                    body: JSON.stringify({ completed: !task.completed })
                });
                await loadData();
                renderDashboard();
                renderTasks();
                renderProjects();
            }
        } else if (target.closest('[data-edit-task]')) {
            const id = target.closest('[data-edit-task]').dataset.editTask;
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('taskModalTitle').textContent = '编辑任务';
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskDescription').value = task.description || '';
                document.getElementById('taskCategory').value = task.category || 'other';
                document.getElementById('taskPriority').value = task.priority || 'none';
                document.getElementById('taskDueDate').value = task.due_date_time ? new Date(task.due_date_time).toISOString().slice(0, 16) : '';
                updateProjectSelect();
                document.getElementById('taskProjectSelect').value = task.project_id || '';
                document.getElementById('taskModal').style.display = 'flex';
            }
        } else if (target.closest('[data-edit-project]')) {
            const id = target.closest('[data-edit-project]').dataset.editProject;
            const project = projects.find(p => p.id === id);
            if (project) {
                editingProjectId = id;
                document.getElementById('projectModalTitle').textContent = '编辑项目';
                document.getElementById('projectId').value = project.id;
                document.getElementById('projectName').value = project.name;
                document.getElementById('projectDescription').value = project.description || '';
                document.getElementById('projectColor').value = project.color;
                document.querySelectorAll('#colorPicker .color-swatch').forEach(s => s.classList.remove('active'));
                document.getElementById('projectModal').style.display = 'flex';
            }
        } else if (target.closest('[data-delete-project]')) {
            e.stopPropagation();
            const id = target.closest('[data-delete-project]').dataset.deleteProject;
            const project = projects.find(p => p.id === id);
            if (project) {
                showConfirm('删除项目', `确定要删除项目「${project.name}」吗？项目中的任务将移至默认项目。`, async (ok) => {
                    if (ok) {
                        await fetchWithAuth(`${API_BASE}/projects/${id}`, { method: 'DELETE' });
                        await loadData();
                        renderDashboard();
                        renderProjects();
                        showToast('项目已删除');
                    }
                });
            }
        } else if (target.closest('[data-delete-task]')) {
            e.stopPropagation();
            const id = target.closest('[data-delete-task]').dataset.deleteTask;
            showConfirm('删除任务', '确定要删除这个任务吗？', async (ok) => {
                if (ok) {
                    await fetchWithAuth(`${API_BASE}/tasks/${id}`, { method: 'DELETE' });
                    await loadData();
                    renderDashboard();
                    renderProjects();
                    renderTasks();
                    showToast('任务已删除');
                }
            });
        } else if (target.closest('[data-show-tasks]')) {
            const id = target.closest('[data-show-tasks]').dataset.showTasks;
            currentProjectFilter = id;
            showView('tasks');
        } else if (target.closest('[data-close-modal]')) {
            const modalId = target.closest('[data-close-modal]').dataset.closeModal;
            document.getElementById(modalId).style.display = 'none';
            if (modalId === 'confirmModal') hideConfirm();
        } else if (target.matches('[data-filter-status]')) {
            currentStatusFilter = target.dataset.filterStatus;
            document.querySelectorAll('[data-filter-status]').forEach(b => b.classList.remove('active'));
            target.classList.add('active');
            renderTasks();
        } else if (target.matches('[data-filter-project]')) {
            currentProjectFilter = target.dataset.filterProject;
            document.querySelectorAll('[data-filter-project]').forEach(b => b.classList.remove('active'));
            target.classList.add('active');
            renderTasks();
        } else if (target.matches('[data-timeline-view]')) {
            timelineMode = target.dataset.timelineView;
            if (timelineMode === 'week') { timelineDays = 14; dayWidth = 100; }
            else { timelineDays = 30; dayWidth = 60; }
            document.querySelectorAll('[data-timeline-view]').forEach(b => b.classList.remove('active'));
            target.classList.add('active');
            renderTimeline();
        } else if (target.closest('[data-task-detail]')) {
            e.stopPropagation();
            const id = target.closest('[data-task-detail]').dataset.taskDetail;
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('taskModalTitle').textContent = '编辑任务';
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskDescription').value = task.description || '';
                document.getElementById('taskCategory').value = task.category || 'other';
                document.getElementById('taskPriority').value = task.priority || 'none';
                document.getElementById('taskDueDate').value = task.due_date_time ? new Date(task.due_date_time).toISOString().slice(0, 16) : '';
                updateProjectSelect();
                document.getElementById('taskProjectSelect').value = task.project_id || '';
                document.getElementById('taskModal').style.display = 'flex';
            }
        } else if (target.closest('[data-toggle-collapse]')) {
            const id = target.closest('[data-toggle-collapse]').dataset.toggleCollapse;
            collapsedProjects[id] = !collapsedProjects[id];
            const row = document.querySelector(`.timeline-row[data-project-id="${id}"]`);
            if (row) row.classList.toggle('collapsed');
        } else if (target.classList.contains('color-swatch')) {
            document.querySelectorAll('#colorPicker .color-swatch').forEach(s => s.classList.remove('active'));
            target.classList.add('active');
            document.getElementById('projectColor').value = target.dataset.color;
        }
    });

    document.getElementById('taskSearchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderTasks();
    });

    document.getElementById('addProjectBtn').addEventListener('click', openCreateProjectModal);
    document.getElementById('saveProjectBtn').addEventListener('click', saveProject);
    document.getElementById('addTaskBtn').addEventListener('click', openCreateTaskModal);
    document.getElementById('saveTaskBtn').addEventListener('click', saveTask);

    document.getElementById('clearCompletedBtn').addEventListener('click', () => {
        const completed = tasks.filter(t => !t.deleted && t.completed);
        if (completed.length === 0) { showToast('没有已完成的任务'); return; }
        showConfirm('清空已完成', `确定要将 ${completed.length} 个已完成任务移到回收站吗？`, async (ok) => {
            if (ok) {
                for (const t of completed) await fetchWithAuth(`${API_BASE}/tasks/${t.id}`, { method: 'DELETE' });
                await loadData();
                renderDashboard();
                renderProjects();
                renderTasks();
                showToast('已清空');
            }
        });
    });

    document.getElementById('confirmOk').addEventListener('click', () => {
        hideConfirm();
        if (confirmCallback) confirmCallback(true);
    });

    document.getElementById('timelineTodayBtn').addEventListener('click', () => {
        timelineStartDate = new Date();
        timelineStartDate.setHours(0,0,0,0);
        renderTimeline();
    });

    document.getElementById('timelinePrevBtn').addEventListener('click', () => {
        const step = timelineMode === 'week' ? 7 : 15;
        timelineStartDate.setDate(timelineStartDate.getDate() - step);
        renderTimeline();
    });

    document.getElementById('timelineNextBtn').addEventListener('click', () => {
        const step = timelineMode === 'week' ? 7 : 15;
        timelineStartDate.setDate(timelineStartDate.getDate() + step);
        renderTimeline();
    });

    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
                if (modal.id === 'confirmModal') hideConfirm();
            }
        });
    });

    document.getElementById('authTabLogin').addEventListener('click', () => {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
        document.getElementById('authTabLogin').classList.add('active');
        document.getElementById('authTabRegister').classList.remove('active');
    });

    document.getElementById('authTabRegister').addEventListener('click', () => {
        document.getElementById('registerForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('authTabRegister').classList.add('active');
        document.getElementById('authTabLogin').classList.remove('active');
    });

    document.getElementById('toRegister').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('authTabRegister').click();
    });

    document.getElementById('toLogin').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('authTabLogin').click();
    });

    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('registerBtn').addEventListener('click', handleRegister);

    (async function init() {
        const isAuthenticated = await checkAuth();
        if (isAuthenticated) {
            showApp();
            await loadData();
            showView('dashboard');
        }
    })();
    </script>
</div>
</body>
</html>
